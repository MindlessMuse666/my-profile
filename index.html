<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Воробьева Мария</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="modal-open">
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
      <video autoplay loop muted playsinline>
        <source src="stuff/luna-nerd.mp4" type="video/mp4">
      </video>
      <h2 style="color: #00ffff; font-size: 16px; margin-bottom: 15px;">Добро пожаловать! (◕‿◕✿)</h2>
      <p style="color: #fff; font-size: 12px; margin-bottom: 25px;">Нажми на кнопочку, чтобы включить магию звука! ✨</p>
      <button class="modal-btn" onclick="unlockAudio()">ВКЛЮЧИТЬ! 🎤</button>
    </div>
  </div>

  <video autoplay loop muted playsinline id="bg-video">
    <source src="stuff/mikusha.mp4" type="video/mp4">
    Ваш браузер не поддерживает видео.
  </video>

  <div class="content-wrapper">
    <img src="stuff/masha.jpg" alt="Воробьева Мария" class="profile-pic" />
    <h1>Воробьева Мария (◕‿◕✿)</h1>
    <p>О себе: Привет! Меня зовут Мария. В свободное время я люблю Бедина Влада и все его 7 личностей. (｡♥‿♥｡)</p>
    <p class="quote">"В каждом сердце должен быть <a href="https://github.com/MindlessMuse666" class="highlight-name">Бедин Влад</a>" ✨ (◡‿◡✿)</p>

    <div class="hobbies">
      <h2>Мои увлечения (´･ω･`)</h2>
      <button><a href="https://github.com/MindlessMuse666">Бедин Влад</a></button>
      <button class="pink-style"><a href="https://github.com/MindlessMuse666">Кедин Влад</a></button>
      <button><a href="https://github.com/MindlessMuse666">Редин Влад</a></button>
      <button class="pink-style"><a href="https://github.com/MindlessMuse666">Медин Влад</a></button>
      <button><a href="https://github.com/MindlessMuse666">Ведин Влад</a></button>
      <button class="pink-style"><a href="https://github.com/MindlessMuse666">Сэдин Влад</a></button>
      <button><a href="https://github.com/MindlessMuse666">Дедин Влад</a></button>
      <button class="pink-style"><a href="https://github.com/MindlessMuse666">Обедин Влад</a></button>
     </div>

    <div class="map-container">
      <iframe 
        src="https://yandex.ru/map-widget/v1/?ll=37.973755%2C55.795413&pt=37.973755%2C55.795413%2Cpm2orgl&z=17"
        frameborder="0"
        allowfullscreen="true">
      </iframe>
    </div>
  </div>

  <script>
    const video = document.getElementById('bg-video');
    const modal = document.getElementById('modal-overlay');
    
    // Функция для разблокировки аудио
    function unlockAudio() {
      video.muted = false;
      video.play();
      modal.classList.add('hidden');
      document.body.classList.remove('modal-open');
      
      // Начинаем анимацию падающих штук только после клика
      setInterval(createFloatingStuff, 1500);
    }

    // Добавляем летающие няшности
    const stuffFiles = [
      '1.mp4', '1.webm', '1.webp', '10.mp4', '13.mp4', '14.jpg', '15.jpg', '16.png', 
      '17.jpg', '18.jpg', '19.jpg', '2.mp4', '2.webm', '20.jpg', '21.jpg', '22.jpg', 
      '23.jpg', '24.jpg', '25.jpg', '26.jpg', '27.jpg', '28.jpg', '29.jpg', '3.mp4', 
      '3.webp', '30.jpg', '31.jpg', '32.jpg', '33.jpg', '34.jpg', '35.jpg', '36.jpg', 
      '37.jpg', '38.jpg', '39.jpg', '4.mp4', '40.jpg', '41.jpg', '42.jpg', '43.jpg', 
      '44.jpg', '45.jpg', '46.jpg', '47.jpg', '48.jpg', '49.jpg', '5.mp4', '5.webp',
      '50.jpg', '51.jpg', '52.jpg', '53.jpg', '54.jpg', '55.jpg', '56.jpg', '57.jpg',
      '58.jpg', '59.jpg', '6.mp4', '6.webp', '60.jpg', '61.jpg', '62.jpg', '63.jpg',
      '64.jpg', '65.jpg', '66.jpg', '67.jpg', '68.jpg', '69.jpg', '70.jpg', '71.jpg',
      '72.jpg', '73.jpg', '74.jpg', '75.jpg', '76.jpg', '77.jpg', '78.jpg', '79.jpg',
      '80.jpg', '9.mp4'
    ];
    
    function createFloatingStuff() {
      const file = stuffFiles[Math.floor(Math.random() * stuffFiles.length)];
      const isVideo = file.endsWith('.mp4') || file.endsWith('.webm');
      const isImage = file.endsWith('.jpg') || file.endsWith('.png') || file.endsWith('.webp');
      
      let el;
      if (isVideo) {
        el = document.createElement('video');
        el.autoplay = true;
        el.loop = true;
        el.muted = true;
        el.playsInline = true;
      } else if (isImage) {
        el = document.createElement('img');
      } else {
        return;
      }
      
      el.className = 'floating-stuff';
      el.src = `stuff/${file}`;
      
      el.style.left = Math.random() * 100 + 'vw';
      el.style.animationDuration = (Math.random() * 10 + 15) + 's';
      el.style.opacity = Math.random() * 0.25 + 0.70;
      
      document.body.appendChild(el);
      
      setTimeout(() => {
        el.remove();
      }, 25000);
    }
  </script>
</body>
</html>
